function hasIntersection(a,b){
    return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

class Tile {
    constructor(){
        this.active=false; this.type="WALL";
        this.tileNum=1; this.tileType=1; this.rot=0;
        this.hitbox={x:0,y:0,w:TILE_SIZE,h:TILE_SIZE};
        this.initialX=0; this.initialY=0;
    }
    init(ix,iy){ this.initialX=ix; this.initialY=iy; this.hitbox={x:ix,y:iy,w:TILE_SIZE,h:TILE_SIZE}; }
    setTile(up,down,left,right,ul,ur,dl,dr){
        if(this.type==="ICE")  {this.tileNum=7;this.tileType=1;this.rot=0;return;}
        if(this.type==="START"){this.tileNum=9;this.tileType=1;this.rot=0;return;}
        if(this.type==="END")  {this.tileNum=9;this.tileType=2;this.rot=0;return;}
        if(this.type!=="WALL") return;
        up.active    = up.active    && up.type==="WALL";
        down.active  = down.active  && down.type==="WALL";
        left.active  = left.active  && left.type==="WALL";
        right.active = right.active && right.type==="WALL";
        ul.active = ul.active && ul.type==="WALL";
        ur.active = ur.active && ur.type==="WALL";
        dl.active = dl.active && dl.type==="WALL";
        dr.active = dr.active && dr.type==="WALL";
        const u=up.active,d=down.active,l=left.active,r=right.active;
        const UL=ul.active,UR=ur.active,DL=dl.active,DR=dr.active;
        if(!u&&!d&&!l&&!r){this.tileNum=1;this.tileType=1;this.rot=0;}
        else if(!u&&!d&&!l&& r){this.tileNum=2;this.tileType=1;this.rot=0;}

        else if(!u&& d&& l&& r&& DR&& DL){this.tileNum=5;this.tileType=1;this.rot=2;}
        else if( u&& d&& l&&!r&& DL&& UL){this.tileNum=5;this.tileType=1;this.rot=3;}
        else if( u&&!d&& l&& r&& UR&&!UL){this.tileNum=5;this.tileType=2;this.rot=0;}
        else if( u&& d&&!l&& r&&!UR&& DR){this.tileNum=5;this.tileType=2;this.rot=1;}
        else if(!u&& d&& l&& r&&!DR&& DL){this.tileNum=5;this.tileType=2;this.rot=2;}
        else if( u&& d&& l&&!r&&!DL&& UL){this.tileNum=5;this.tileType=2;this.rot=3;}
        else if( u&&!d&& l&& r&&!UR&& UL){this.tileNum=5;this.tileType=3;this.rot=0;}
        else if( u&& d&&!l&& r&& UR&&!DR){this.tileNum=5;this.tileType=3;this.rot=1;}
        else if(!u&& d&& l&& r&& DR&&!DL){this.tileNum=5;this.tileType=3;this.rot=2;}
        else if( u&& d&& l&&!r&& DL&&!UL){this.tileNum=5;this.tileType=3;this.rot=3;}

    render(ctx,sheet,showHitboxes){
        const hb=this.hitbox;
        if(!this.active) return;
        if(hb.x>-hb.w&&hb.y>-hb.h&&hb.x<SCREEN_WIDTH&&hb.y<SCREEN_HEIGHT){
            const sx=(this.tileNum-1)*17, sy=(this.tileType-1)*17;
            const cx=hb.x+hb.w/2, cy=hb.y+hb.h/2;
            ctx.save();
            ctx.translate(cx,cy);
            ctx.rotate(this.rot*Math.PI/2);
            ctx.drawImage(sheet,sx,sy,17,17,-hb.w/2,-hb.h/2,hb.w,hb.h);
            ctx.restore();
            if(showHitboxes){
                if(this.type==="WALL") {ctx.strokeStyle='rgb(255,0,0)';  ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
                if(this.type==="ICE")  {ctx.strokeStyle='rgb(255,255,0)';ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
                if(this.type==="START"){ctx.strokeStyle='rgb(255,255,0)';  ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
                if(this.type==="END")  {ctx.strokeStyle='rgb(255,255,0)';  ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);}
            }
        }
    }
}

class Car {
    constructor(){
        this.xVel=0; this.yVel=0;
        this.drawDir=270;
        this.xPos=INITIAL_CAR_X;
        this.yPos=INITIAL_CAR_Y;
        this.visual={x:SCREEN_WM-Math.floor(CAR_WIDTH/2),y:SCREEN_HM-Math.floor(CAR_HEIGHT/2),w:CAR_WIDTH,h:CAR_HEIGHT};
        this.hitbox={x:SCREEN_WM-Math.floor(CAR_WIDTH/2),y:SCREEN_HM-Math.floor(CAR_HEIGHT/2),w:50,h:50};
        this.mouseX=0; this.mouseY=0;
    }
    updateMovement(mx,my){
        const ox=mx-(SCREEN_WM-Math.floor(CAR_WIDTH/2));
        const oy=my-(SCREEN_HM-Math.floor(CAR_HEIGHT/2));
        let dx=ox/1000, dy=oy/1000;
        if(dx> ACCELERATION) dx= ACCELERATION;
        if(dy> ACCELERATION) dy= ACCELERATION;
        if(dx<-ACCELERATION) dx=-ACCELERATION;
        if(dy<-ACCELERATION) dy=-ACCELERATION;
        this.xVel+=dx; this.yVel+=dy;
        this.drawDir=Math.atan2(dy,dx)*180/Math.PI+90;
    }
    updatePosition(tiles){
        let onIce=false;
        const hb=this.hitbox;
        outer: for(let i=0;i<TILE_GRID_HEIGHT;i++){
            for(let j=0;j<TILE_GRID_WIDTH;j++){
                const t=tiles[i][j];
                if(t.active&&t.type==="ICE"&&hb.x<t.hitbox.x+t.hitbox.w&&hb.x+hb.w>t.hitbox.x&&hb.y<t.hitbox.y+t.hitbox.h&&hb.y+hb.h>t.hitbox.y){onIce=true;break outer;}
            }
        }
        if(onIce){this.xVel*=FRICTION;this.yVel*=FRICTION;}
        else{this.xVel*=0.9;this.yVel*=0.9;}
        if(Math.abs(this.xVel)<0.05) this.xVel=0;
        if(Math.abs(this.yVel)<0.05) this.yVel=0;
        let xHit=false, yHit=false;
        const hbResetX=SCREEN_WM-Math.floor(CAR_WIDTH/2);
        const hbResetY=SCREEN_HM-Math.floor(CAR_HEIGHT/2);
        this.hitbox.x=hbResetX; this.hitbox.y=hbResetY;
        const xSteps=Math.ceil(Math.abs(this.xVel));
        const xDir=Math.sign(this.xVel);
        for(let i=0;i<xSteps;i++){
            this.hitbox.x+=xDir;
            for(let r=0;r<TILE_GRID_HEIGHT;r++)
                for(let c=0;c<TILE_GRID_WIDTH;c++){
                    const t=tiles[r][c];
                    if(t.active&&t.type==="WALL"&&hasIntersection(this.hitbox,t.hitbox)) xHit=true;
                }
        }
        this.hitbox.x=hbResetX; this.hitbox.y=hbResetY;
        const ySteps=Math.ceil(Math.abs(this.yVel));
        const yDir=Math.sign(this.yVel);
        for(let i=0;i<ySteps;i++){
            this.hitbox.y+=yDir;
            for(let r=0;r<TILE_GRID_HEIGHT;r++)
                for(let c=0;c<TILE_GRID_WIDTH;c++){
                    const t=tiles[r][c];
                    if(t.active&&t.type==="WALL"&&hasIntersection(this.hitbox,t.hitbox)) yHit=true;
                }
        }
        this.hitbox.x=hbResetX; this.hitbox.y=hbResetY;
        if(xHit) this.xVel*=-0.4;
        if(yHit) this.yVel*=-0.4;
        this.xPos+=this.xVel; this.yPos+=this.yVel;
    }
    update(mx,my,tiles){ this.updateMovement(mx,my); this.updatePosition(tiles); this.mouseX=mx; this.mouseY=my; }
    render(ctx,carImg,showHitboxes){
        const v=this.visual;
        const SHADOW_OFFSET=5;
        const scx=v.x-SHADOW_OFFSET+CAR_WIDTH/2, scy=v.y+SHADOW_OFFSET+CAR_HEIGHT/2-10;
        ctx.save();
        ctx.globalAlpha=50/255;
        ctx.filter='brightness(0)';
        ctx.translate(scx,scy);
        ctx.rotate(this.drawDir*Math.PI/180);
        ctx.drawImage(carImg,-CAR_WIDTH/2,-(CAR_HEIGHT/2-10),CAR_WIDTH,CAR_HEIGHT);
        ctx.restore();
        const cx=v.x+CAR_WIDTH/2, cy=v.y+CAR_HEIGHT/2-10;
        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(this.drawDir*Math.PI/180);
        ctx.drawImage(carImg,-CAR_WIDTH/2,-(CAR_HEIGHT/2-10),CAR_WIDTH,CAR_HEIGHT);
        ctx.restore();
        if(showHitboxes){
            const hb=this.hitbox;
            ctx.strokeStyle='rgb(255,0,0)';
            ctx.strokeRect(hb.x,hb.y,hb.w,hb.h);
            const hcx=hb.x+hb.w/2, hcy=hb.y+hb.h/2;
            ctx.strokeStyle='rgb(0,0,255)';
            ctx.beginPath();
            ctx.moveTo(hcx,hcy);
            ctx.lineTo(this.mouseX,this.mouseY);
            ctx.stroke();
            if(this.xVel!==0||this.yVel!==0){
                const mouseLen=Math.sqrt((this.mouseX-hcx)**2+(this.mouseY-hcy)**2);
                const velLen=Math.sqrt(this.xVel*this.xVel+this.yVel*this.yVel);
                ctx.strokeStyle='rgb(0,255,255)';
                ctx.beginPath();
                ctx.moveTo(hcx,hcy);
                ctx.lineTo(hcx+(this.xVel/velLen)*mouseLen,hcy+(this.yVel/velLen)*mouseLen);
                ctx.stroke();
            }
        }
    }
}

class Background {
    constructor(){
        this.initCarX=INITIAL_CAR_X;
        this.initCarY=INITIAL_CAR_Y;
        this.bw=0; this.bh=0; this.rects=[];
        this.rebuild();
    }
    rebuild(){
        this.bw=Math.ceil(SCREEN_WIDTH/TILE_SIZE)+1;
        this.bh=Math.ceil(SCREEN_HEIGHT/TILE_SIZE)+1;
        this.rects=[];
        for(let i=0;i<this.bh;i++){
            this.rects[i]=[];
            for(let j=0;j<this.bw;j++)
                this.rects[i][j]={x:j*TILE_SIZE,y:i*TILE_SIZE,w:TILE_SIZE,h:TILE_SIZE};
        }
    }
    update(px,py){
        const offX=((Math.trunc(px-this.initCarX)%TILE_SIZE)+TILE_SIZE)%TILE_SIZE;
        const offY=((Math.trunc(py-this.initCarY)%TILE_SIZE)+TILE_SIZE)%TILE_SIZE;
        for(let i=0;i<this.bh;i++)
            for(let j=0;j<this.bw;j++){
                this.rects[i][j].x=j*TILE_SIZE-offX;
                this.rects[i][j].y=i*TILE_SIZE-offY;
            }
    }
    render(ctx,sheet){
        for(let i=0;i<this.bh;i++)
            for(let j=0;j<this.bw;j++){
                const r=this.rects[i][j];
                ctx.drawImage(sheet,7*17,0,17,17,r.x,r.y,r.w,r.h);
            }
    }
}

// --- Init ---
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

function resizeCanvas(){
    SCREEN_WIDTH=window.innerWidth; SCREEN_HEIGHT=window.innerHeight;
    SCREEN_WM=SCREEN_WIDTH/2; SCREEN_HM=SCREEN_HEIGHT/2;
    canvas.width=SCREEN_WIDTH; canvas.height=SCREEN_HEIGHT;
    ctx.imageSmoothingEnabled=false;
}
resizeCanvas();

let showHitboxes=false;
let mouseX=SCREEN_WM, mouseY=SCREEN_HM;
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;});
function updateFromTouch(e){e.preventDefault();const r=canvas.getBoundingClientRect();const t=e.touches[0];mouseX=t.clientX-r.left;mouseY=t.clientY-r.top;}
canvas.addEventListener('touchstart',updateFromTouch,{passive:false});
canvas.addEventListener('touchmove', updateFromTouch,{passive:false});
document.addEventListener('keydown',e=>{if(e.key==='Shift') showHitboxes=true;});
document.addEventListener('keyup',  e=>{if(e.key==='Shift') showHitboxes=false;});

function loadImg(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=()=>rej(new Error('Cannot load: '+src));i.src=src;});}

ctx.fillStyle='#222'; ctx.fillRect(0,0,SCREEN_WIDTH,SCREEN_HEIGHT);
ctx.fillStyle='#fff'; ctx.font='32px monospace'; ctx.fillText('Loading textures...',60,SCREEN_HM);

Promise.all([loadImg('textures/tiles.png'),loadImg('textures/car.png')]).then(([sheet,carImg])=>{
    // Build tiles
    const tiles=[];
    for(let i=0;i<TILE_GRID_HEIGHT;i++){
        tiles[i]=[];
        for(let j=0;j<TILE_GRID_WIDTH;j++){
            const t=new Tile();
            t.init(j*TILE_SIZE,i*TILE_SIZE);
            const v=TILE_MAP[i][j];
            if(v===1){t.active=true;t.type="WALL";}
            else if(v===2){t.active=true;t.type="ICE";}
            else if(v===3){t.active=true;t.type="START";}
            else if(v===4){t.active=true;t.type="END";}
            tiles[i][j]=t;
        }
    }
    // SetTile neighbors
    for(let i=0;i<TILE_GRID_HEIGHT;i++){
        for(let j=0;j<TILE_GRID_WIDTH;j++){
            const make=(r,c)=>{
                if(r<0||r>=TILE_GRID_HEIGHT||c<0||c>=TILE_GRID_WIDTH) return {active:false,type:"N/A"};
                return {active:tiles[r][c].active, type:tiles[r][c].type};
            };
            tiles[i][j].setTile(
                make(i-1,j),make(i+1,j),make(i,j-1),make(i,j+1),
                make(i-1,j-1),make(i-1,j+1),make(i+1,j-1),make(i+1,j+1)
            );
        }
    }

    const player=new Car();
    const bg=new Background();

    window.addEventListener('resize',()=>{
        resizeCanvas();
        bg.rebuild();
        player.visual.x=SCREEN_WM-Math.floor(CAR_WIDTH/2);
        player.visual.y=SCREEN_HM-Math.floor(CAR_HEIGHT/2);
        player.hitbox.x=SCREEN_WM-Math.floor(CAR_WIDTH/2);
        player.hitbox.y=SCREEN_HM-Math.floor(CAR_HEIGHT/2);
    });

    function loop(){
        player.update(mouseX,mouseY,tiles);
        for(let i=0;i<TILE_GRID_HEIGHT;i++)
            for(let j=0;j<TILE_GRID_WIDTH;j++)
                tiles[i][j].update(player.xPos,player.yPos);
        bg.update(player.xPos,player.yPos);

        ctx.fillStyle='rgb(0,255,0)';
        ctx.fillRect(0,0,SCREEN_WIDTH,SCREEN_HEIGHT);

        bg.render(ctx,sheet);
        for(let i=0;i<TILE_GRID_HEIGHT;i++)
            for(let j=0;j<TILE_GRID_WIDTH;j++)
                tiles[i][j].render(ctx,sheet,showHitboxes);
        player.render(ctx,carImg,showHitboxes);

        requestAnimationFrame(loop);
    }
    loop();
}).catch(err=>{
    console.error(err);
    ctx.fillStyle='#222'; ctx.fillRect(0,0,SCREEN_WIDTH,SCREEN_HEIGHT);
    ctx.fillStyle='#f66'; ctx.font='24px monospace';
    const lines=(err.stack||err.toString()).split('\n');
    lines.forEach((l,i)=>ctx.fillText(l.slice(0,90),40,80+i*30));
});
</script>
